<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alta de Usuario</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <nav>
        <a href="inicio.html">Inicio</a>
        <a href="somos.html">Somos</a>
        <a href="agregar.html">Agregar</a>
        <a href="alta.html" class="active">Alta</a>
        <a href="visitanos.html">Visítanos</a>
    </nav>
    <div class="container">
        <div class="header-title">
            <h2>Regístrate en este sitio</h2>
        </div>
        <form action="#" method="POST">
            <div class="form-group">
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" required>
            </div>
            <p class="form-footer-text">
                Se te enviará una confirmación del registro por correo electrónico.
            </p>
            <button type="submit" class="btn-submit">Registrarse</button>
        </form>
    </div>
</body>
</html>
